<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop - Product</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #ffaa00;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .product {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .product img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .product-details {
            flex: 1;
        }

        .product-details h1 {
            margin-top: 0;
        }

        .price {
            font-size: 24px;
            color: #e91e63;
            margin: 10px 0;
        }

        .order-button {
            display: inline-block;
            padding: 12px 25px;
            background-color: #e91e63;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .order-button:hover {
            background-color: #d81b60;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #eee;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>BUKSAN MO PAPASUKIN AKO ONLINE SHOP</h1>
    </header>

    <div class="container">
        <div class="product">
            <div class="product-image">
                <a href="https://ibb.co/n865KH3v"><img src="https://i.ibb.co/Kzb38MNk/feb22-perspective.png" alt="feb22-perspective" border="0"></a>
            </div>
            <div class="product-details">
                <h1>Multi-Function Drawing Table</h1>
                <p>High-quality drawing table with adjustable tilt, rotation, and ergonomic design for artists of all levels.</p>
                <p class="price">₱30,000</p>
                <a class="order-button" href="https://web.facebook.com/johnmichael.hidalgo.39" target="_blank">Order Now</a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 SHOPEEng. All rights reserved.
    </footer>
</body>

</html>
